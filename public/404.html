      max-width: 27rem;
      color: #bfb2a2;
      line-height: 1.6;

      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      border: 1px solid #e05b27;
      border-radius: 999px;
      color: #fff5e8;
      text-decoration: none;
      font-weight: 650;
